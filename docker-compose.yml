services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    environment:
      - NAME=AI Smart Planner
      - DEBUG=${DEBUG:-false}
      - ADDRESS=0.0.0.0
      - PORT=8000
      - RELOAD=${DEBUG:-false}
      - CORS_ORIGINS=["*"]
      - OPENAI_API_KEY=${OPENAI_API_KEY:?'OPENAI_API_KEY is required'}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-ai_planner}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-planner-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ai_planner}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_planner}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-planner-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-8501}:8501"
    environment:
      - API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - ai-planner-network

volumes:
  postgres_data:

networks:
  ai-planner-network:
    name: ai-planner-network
