version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: innofocus
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway" # Позволяет контейнеру видеть Ollama на хосте VM

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
